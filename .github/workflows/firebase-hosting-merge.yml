# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm run build
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KINDEVX }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          
          # Run deploy, capture output regardless of exit code
          npx -y firebase-tools@latest deploy --only hosting --project kindevx 2>&1 | tee /tmp/deploy-output.txt || true
          
          # Clean up credentials immediately
          rm -f /tmp/firebase-sa.json
          
          # Check results: ignore the known "current active version" bug
          if grep -q "is the current active version" /tmp/deploy-output.txt; then
            echo "✅ Deploy succeeded (site is already up to date — known Firebase CLI bug ignored)"
          elif grep -q "Deploy complete" /tmp/deploy-output.txt; then
            echo "✅ Deploy complete"
          elif grep -q "file upload complete" /tmp/deploy-output.txt; then
            echo "✅ Deploy succeeded (files uploaded and finalized)"
          else
            echo "❌ Deploy failed with an unexpected error:"
            cat /tmp/deploy-output.txt
            exit 1
          fi
